name: frendly-observability

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-127.0.0.1:9090}:9090"
    depends_on:
      - node_exporter
      - postgres_exporter
      - redis_exporter
      - pgbouncer_exporter

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-127.0.0.1:3009}:3000"
    depends_on:
      - prometheus

  node_exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DATA_SOURCE_NAME:-postgresql://postgres:postgres@postgres:5432/big_break?sslmode=disable}
    expose:
      - "9187"

  redis_exporter:
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_EXPORTER_ADDR:-redis://redis:6379}
    expose:
      - "9121"

  pgbouncer_exporter:
    image: prometheuscommunity/pgbouncer-exporter:v0.9.0
    restart: unless-stopped
    command:
      - "--pgBouncer.connectionString=${PGBOUNCER_EXPORTER_CONNECTION_STRING:-postgres://postgres:postgres@pgbouncer:6432/pgbouncer?sslmode=disable}"
    expose:
      - "9127"

volumes:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: ${OBSERVABILITY_NETWORK:-frendly-backend_default}
    external: true
