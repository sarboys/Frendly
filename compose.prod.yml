name: frendly-backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      [
        "postgres",
        "-c",
        "shared_preload_libraries=pg_stat_statements",
        "-c",
        "pg_stat_statements.track=all",
        "-c",
        "log_min_duration_statement=${POSTGRES_LOG_MIN_DURATION_STATEMENT:-500}",
        "-c",
        "statement_timeout=${POSTGRES_STATEMENT_TIMEOUT:-15s}",
        "-c",
        "idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_SESSION_TIMEOUT:-30s}",
      ]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgbouncer:
    image: bitnami/pgbouncer:1.24.1
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_PORT: 6432
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-500}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      PGBOUNCER_RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-10}
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: "no"
    env_file:
      - .env.production
    environment:
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      DATABASE_URL: ${DATABASE_DIRECT_URL}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      /bin/sh -c "
      pnpm --filter @big-break/database db:deploy &&
      pnpm --filter @big-break/database db:indexes:hot-path &&
      if [ \"$${RUN_DB_SEED:-false}\" = \"true\" ]; then
        pnpm --filter @big-break/database db:seed;
      else
        echo 'Skipping production seed';
      fi
      "

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      DATABASE_POOL_URL: ${DATABASE_POOL_URL}
      DATABASE_URL: ${DATABASE_POOL_URL}
      CHAT_UNREAD_COUNTER_READS: ${CHAT_UNREAD_COUNTER_READS:-false}
      ENABLE_POSTGIS_EVENT_FEED: ${ENABLE_POSTGIS_EVENT_FEED:-false}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      PORT: 3000
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["pnpm", "--filter", "@big-break/api", "start"]

  chat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      DATABASE_POOL_URL: ${DATABASE_POOL_URL}
      DATABASE_URL: ${DATABASE_POOL_URL}
      WORKER_OUTBOX_BATCH_CLAIM: ${WORKER_OUTBOX_BATCH_CLAIM:-false}
      WORKER_OUTBOX_PROCESSING_CONCURRENCY: ${WORKER_OUTBOX_PROCESSING_CONCURRENCY:-1}
      WORKER_RETENTION_CLEANUP_ENABLED: ${WORKER_RETENTION_CLEANUP_ENABLED:-false}
      WORKER_RETENTION_CLEANUP_INTERVAL_MS: ${WORKER_RETENTION_CLEANUP_INTERVAL_MS:-21600000}
      RETENTION_BATCH_SIZE: ${RETENTION_BATCH_SIZE:-500}
      OUTBOX_DONE_RETENTION_DAYS: ${OUTBOX_DONE_RETENTION_DAYS:-14}
      OUTBOX_FAILED_RETENTION_DAYS: ${OUTBOX_FAILED_RETENTION_DAYS:-30}
      AUTH_AUDIT_RETENTION_DAYS: ${AUTH_AUDIT_RETENTION_DAYS:-180}
      OTP_RETENTION_DAYS: ${OTP_RETENTION_DAYS:-7}
      NOTIFICATION_READ_RETENTION_DAYS: ${NOTIFICATION_READ_RETENTION_DAYS:-365}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      PORT: 3001
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["pnpm", "--filter", "@big-break/chat", "start"]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      DATABASE_POOL_URL: ${DATABASE_POOL_URL}
      DATABASE_URL: ${DATABASE_POOL_URL}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      PORT: 3002
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
    expose:
      - "3002"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["pnpm", "--filter", "@big-break/worker", "start"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      chat:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/frendly.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
