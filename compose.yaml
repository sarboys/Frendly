x-s3-environment: &s3-environment
  S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.cloud.ru}
  S3_REGION: ${S3_REGION:-ru-central-1}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-}
  S3_BUCKET: ${S3_BUCKET:-frendly}
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-https://global.s3.cloud.ru}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: big_break
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d big_break"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *s3-environment
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_break
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      TELEGRAM_AUTH_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_BOT_USERNAME: ""
      TELEGRAM_POLL_INTERVAL_MS: 1500
      PUSH_PROVIDER: fake
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      /bin/sh -c "
      pnpm --filter @big-break/database db:deploy &&
      pnpm --filter @big-break/database db:seed
      "

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *s3-environment
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_break
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      TELEGRAM_AUTH_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_BOT_USERNAME: ""
      TELEGRAM_POLL_INTERVAL_MS: 1500
      PUSH_PROVIDER: fake
      ENABLE_TEST_PHONE_SHORTCUTS: "true"
      ENABLE_TESTING_ACCESS: "true"
      PAYMENTS_TBANK_ENABLED: ${PAYMENTS_TBANK_ENABLED:-false}
      TBANK_TERMINAL_KEY: ${TBANK_TERMINAL_KEY:-}
      TBANK_PASSWORD: ${TBANK_PASSWORD:-}
      TBANK_API_URL: ${TBANK_API_URL:-https://securepay.tinkoff.ru}
      TBANK_NOTIFICATION_URL: ${TBANK_NOTIFICATION_URL:-}
      APP_DEEP_LINK_SCHEME: ${APP_DEEP_LINK_SCHEME:-frendly}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3000}
      PORT: 3000
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    command: ["pnpm", "--filter", "@big-break/api", "start"]

  chat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *s3-environment
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_break
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      TELEGRAM_AUTH_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_BOT_USERNAME: ""
      TELEGRAM_POLL_INTERVAL_MS: 1500
      PUSH_PROVIDER: fake
      PORT: 3001
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    command: ["pnpm", "--filter", "@big-break/chat", "start"]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      <<: *s3-environment
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/big_break
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      PUSH_PROVIDER: fake
      CONTENT_IMPORT_ENABLED: ${CONTENT_IMPORT_ENABLED:-false}
      CONTENT_IMPORT_INTERVAL_MS: ${CONTENT_IMPORT_INTERVAL_MS:-14400000}
      CONTENT_IMPORT_CITIES: ${CONTENT_IMPORT_CITIES:-Москва,Санкт-Петербург}
      CONTENT_IMPORT_SOURCES: ${CONTENT_IMPORT_SOURCES:-kudago,timepad,advcake_ticketland}
      ADVCAKE_API_PASS: ${ADVCAKE_API_PASS:-}
      ADVCAKE_BASE_URL: ${ADVCAKE_BASE_URL:-https://api.advcake.com}
      ADVCAKE_TICKETLAND_OFFER_ID: ${ADVCAKE_TICKETLAND_OFFER_ID:-663}
      ADVCAKE_TICKETLAND_WEBSITES: ${ADVCAKE_TICKETLAND_WEBSITES:-ticketland.ru,live.mts.ru}
      ADVCAKE_FEED_FORMAT: ${ADVCAKE_FEED_FORMAT:-yml}
      PORT: 3002
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3002:3002"
    command: ["pnpm", "--filter", "@big-break/worker", "start"]
