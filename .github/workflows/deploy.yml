name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - ".env.production.example"
      - ".github/workflows/deploy.yml"
      - ".gitignore"
      - ".dockerignore"
      - "backend/**"
      - "compose.prod.yml"
      - "deploy/**"
      - "scripts/**"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            export APP_DIR="${{ secrets.DEPLOY_APP_DIR != '' && secrets.DEPLOY_APP_DIR || '/opt/frendly' }}"
            export REPO_URL="https://github.com/sarboys/Frendly.git"
            export BRANCH="main"
            export ENV_FILE="${APP_DIR}/.env.production"

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

      - name: Check public health
        run: curl --fail --retry 12 --retry-delay 5 "http://${{ secrets.DEPLOY_HOST }}/health"
