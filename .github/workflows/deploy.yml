name: Deploy Backend

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 82.202.157.228
          username: user1
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -eu
            export APP_DIR="/opt/frendly"
            export REPO_URL="https://github.com/sarboys/Frendly.git"
            export BRANCH="main"
            export TARGET_SHA="${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}"
            export ENV_FILE="${APP_DIR}/.env.production"

            echo "Disk usage before deploy pre-clean:"
            df -h / /tmp || true
            docker system df || true
            if [ -f "${APP_DIR}/compose.prod.yml" ] && [ -f "$ENV_FILE" ]; then
              docker compose --env-file "$ENV_FILE" -f "${APP_DIR}/compose.prod.yml" rm -sf migrate || true
            fi
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            rm -f /tmp/.tmp-compose-build-metadataFile-* || true
            echo "Disk usage after deploy pre-clean:"
            df -h / /tmp || true
            docker system df || true

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
            curl --fail --retry 12 --retry-delay 5 "http://127.0.0.1/health"
