name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-mobile:
    runs-on: ubuntu-latest
    outputs:
      has_mobile: ${{ steps.check.outputs.has_mobile }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Check mobile workspace
        run: |
          if [ -f mobile/pubspec.yaml ]; then
            echo "has_mobile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_mobile=false" >> "$GITHUB_OUTPUT"
          fi

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: big_break
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d big_break"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/big_break
      REDIS_URL: redis://localhost:6379
      S3_ENDPOINT: https://s3.cloud.ru
      S3_REGION: ru-central-1
      S3_ACCESS_KEY: test-tenant:test-key
      S3_SECRET_KEY: test-secret
      S3_BUCKET: frendly-test
      S3_PUBLIC_ENDPOINT: https://global.s3.cloud.ru
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      ENABLE_DEV_AUTH: true
      ENABLE_DEV_OTP: true
      PUSH_PROVIDER: fake

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Install backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        working-directory: backend
        run: pnpm db:deploy

      - name: Seed database
        working-directory: backend
        run: pnpm db:seed

      - name: Run backend tests
        working-directory: backend
        run: pnpm test

      - name: Run backend audit
        continue-on-error: true
        working-directory: backend
        run: pnpm audit --prod --audit-level high

  mobile:
    needs: detect-mobile
    if: ${{ needs.detect-mobile.outputs.has_mobile == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install mobile deps
        working-directory: mobile
        run: flutter pub get

      - name: Analyze mobile
        working-directory: mobile
        run: flutter analyze

      - name: Run mobile tests
        working-directory: mobile
        run: flutter test

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks scan
        run: gitleaks git --no-banner --redact --exit-code 1 .
