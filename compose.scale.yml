name: frendly-backend

services:
  api_a:
    extends:
      file: compose.prod.yml
      service: api
    environment:
      METRICS_SERVICE_NAME: api_a

  api_b:
    extends:
      file: compose.prod.yml
      service: api
    environment:
      METRICS_SERVICE_NAME: api_b

  chat_a:
    extends:
      file: compose.prod.yml
      service: chat
    environment:
      METRICS_SERVICE_NAME: chat_a

  chat_b:
    extends:
      file: compose.prod.yml
      service: chat
    environment:
      METRICS_SERVICE_NAME: chat_b

  worker_realtime:
    extends:
      file: compose.prod.yml
      service: worker
    environment:
      METRICS_SERVICE_NAME: worker_realtime
      WORKER_OUTBOX_ENABLED: "true"
      WORKER_CONTENT_ENABLED: "false"
      WORKER_SCHEDULES_ENABLED: "false"
      CONTENT_IMPORT_ENABLED: "false"
      CONTENT_IMPORT_IMAGE_BACKFILL_ENABLED: "false"
      CONTENT_ROUTE_GENERATION_ENABLED: "false"
      WORKER_RETENTION_CLEANUP_ENABLED: "false"

  worker_content:
    extends:
      file: compose.prod.yml
      service: worker
    environment:
      METRICS_SERVICE_NAME: worker_content
      WORKER_OUTBOX_ENABLED: "false"
      WORKER_CONTENT_ENABLED: "true"
      WORKER_SCHEDULES_ENABLED: "false"

  worker_schedules:
    extends:
      file: compose.prod.yml
      service: worker
    environment:
      METRICS_SERVICE_NAME: worker_schedules
      WORKER_OUTBOX_ENABLED: "false"
      WORKER_CONTENT_ENABLED: "false"
      WORKER_SCHEDULES_ENABLED: "true"
      CONTENT_IMPORT_ENABLED: "false"
      CONTENT_IMPORT_IMAGE_BACKFILL_ENABLED: "false"
      CONTENT_ROUTE_GENERATION_ENABLED: "false"

  nginx:
    depends_on:
      api_a:
        condition: service_healthy
      api_b:
        condition: service_healthy
      chat_a:
        condition: service_healthy
      chat_b:
        condition: service_healthy
      landing:
        condition: service_healthy
      admin_internal:
        condition: service_healthy
      admin_partner:
        condition: service_healthy
    volumes:
      - ./deploy/nginx/frendly.scale.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
