name: big_break_mobile
description: Big Break Flutter app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.8.0+1
  file_picker: ^10.3.2
  file_saver: ^0.3.1
  flutter_cache_manager: ^3.4.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  flutter_lucide: ^1.8.2
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  just_audio: ^0.9.46
  open_filex: ^4.7.0
  permission_handler: ^11.4.0
  record: ^6.1.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  web_socket_channel: ^3.0.3
  yandex_mapkit: ^4.2.1
  google_sign_in: ^7.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
