upstream api_backend {
  server api:3000;
}

upstream chat_backend {
  server chat:3001;
}

upstream landing_frontend {
  server landing:80;
}

upstream admin_internal_frontend {
  server admin_internal:80;
}

upstream admin_partner_frontend {
  server admin_partner:80;
}

server {
  listen 80 default_server;
  server_name api.frendly.tech _;

  client_max_body_size 32m;

  location /ws {
    proxy_pass http://chat_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
  }

  location / {
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name admin.frendly.tech partner.frendly.tech;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name api.frendly.tech;

  ssl_certificate /etc/letsencrypt/live/api.frendly.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.frendly.tech/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  client_max_body_size 32m;

  location /ws {
    proxy_pass http://chat_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 600s;
  }

  location / {
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl;
  server_name admin.frendly.tech;

  ssl_certificate /etc/letsencrypt/live/admin.frendly.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.frendly.tech/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  client_max_body_size 32m;

  location / {
    proxy_pass http://admin_internal_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl;
  server_name partner.frendly.tech;

  ssl_certificate /etc/letsencrypt/live/partner.frendly.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/partner.frendly.tech/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  client_max_body_size 32m;

  location / {
    proxy_pass http://admin_partner_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 80;
  server_name frendly.tech www.frendly.tech;

  client_max_body_size 32m;

  location / {
    proxy_pass http://landing_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
