global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:3000
        labels:
          topology: single
      - targets:
          - api_a:3000
          - api_b:3000
        labels:
          topology: scale

  - job_name: chat
    metrics_path: /metrics
    static_configs:
      - targets:
          - chat:3001
        labels:
          topology: single
      - targets:
          - chat_a:3001
          - chat_b:3001
        labels:
          topology: scale

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:3002
        labels:
          role: all
          topology: single
      - targets:
          - worker_realtime:3002
        labels:
          role: realtime
          topology: scale
      - targets:
          - worker_content:3002
        labels:
          role: content
          topology: scale
      - targets:
          - worker_schedules:3002
        labels:
          role: schedules
          topology: scale

  - job_name: node
    static_configs:
      - targets:
          - node_exporter:9100

  - job_name: postgres
    static_configs:
      - targets:
          - postgres_exporter:9187

  - job_name: redis
    static_configs:
      - targets:
          - redis_exporter:9121

  - job_name: pgbouncer
    static_configs:
      - targets:
          - pgbouncer_exporter:9127
